name: Update Track Conditions

# 実行するタイミング（トリガー）の設定
on:
  schedule:
    # cron式: UTC時間で指定。JST(日本時間)はUTC+9時間。
    # 日本時間の 18:00 (UTC 09:00) に 金,土,日で実行
    - cron: '0 9 * * 5,6,0'
  workflow_dispatch: # 手動で「Run workflow」ボタンからも実行できるようにする

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      # 1. リポジトリのコードをチェックアウト（取得）する
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. 実行環境のセットアップ（例：DartやPythonなど）
      # （※ここは今後、更新用のスクリプト言語に合わせて変更します）
      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      # 3. 更新スクリプトの実行（例）
      # - name: Run Scraping Script
      #   run: dart run scraper.dart

      # 4. 変更があった場合のみ、自動でコミット＆プッシュして version.json をインクリメントする
      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add track_conditions.csv track_conditions.json version.json
          # 変更があるか確認。変更がなければ何もしない
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update track conditions" && git push)
